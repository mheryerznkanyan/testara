version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROJECT_ROOT=/app/ios-app
      - RAG_PERSIST_DIR=/app/rag_store
    volumes:
      - ./rag_store:/app/rag_store
      - ${IOS_APP_PATH:-./ios-app}:/app/ios-app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - PROJECT_ROOT=/app/ios-app
    volumes:
      - ${IOS_APP_PATH:-./ios-app}:/app/ios-app:ro
    depends_on:
      - backend
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
