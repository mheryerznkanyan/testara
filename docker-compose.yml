version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PROJECT_ROOT=/app/ios-app
      - RAG_PERSIST_DIR=/app/rag_store
      - RAG_COLLECTION=${RAG_COLLECTION:-ios_app}
    volumes:
      - ./rag_store:/app/rag_store
      - ${PROJECT_ROOT:-./ios-app}:/app/ios-app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
